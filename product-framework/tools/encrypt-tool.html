<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GOAL 課程內容加密產生器 (講師專用工具)</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: #334155;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-color);
            color: var(--text);
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        h1 { color: var(--accent); }
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 12px;
            margin-bottom: 24px;
        }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: #fff;
            font-family: monospace;
            box-sizing: border-box;
            margin-bottom: 16px;
        }
        textarea { height: 200px; }
        button {
            background: var(--accent);
            color: #0f172a;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover { opacity: 0.9; }
        .output-box {
            background: #020617;
            padding: 16px;
            border-radius: 8px;
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <h1>🔒 GOAL 課程講義內容加密產生器</h1>
    <p style="color: var(--muted);">此工具能在瀏覽器端直接使用 AES-GCM 256-bit 將講義 JSON 文字加密成可在 GitHub 上安全發布的代碼。</p>

    <div class="card">
        <label for="passcode">設定上課驗證密碼：</label>
        <input type="text" id="passcode" value="pf2026" placeholder="請輸入密碼，例如 pf2026">

        <label for="rawJson">原始講義 JSON/文字資料：</label>
        <textarea id="rawJson" placeholder="輸入 JSON 結構或講義大綱"></textarea>

        <button id="encryptBtn">🔐 開始加密 (Encrypt)</button>
    </div>

    <div class="card">
        <h3>加密結果 (複製貼入 `data/course-payload.js`)：</h3>
        <div id="output" class="output-box">尚未加密</div>
        <br>
        <button id="copyBtn">📋 複製加密代碼</button>
    </div>

    <script src="../js/crypto.js"></script>
    <script>
        document.getElementById('encryptBtn').addEventListener('click', async () => {
            const pwd = document.getElementById('passcode').value.trim();
            const text = document.getElementById('rawJson').value;

            if (!pwd) {
                alert('請輸入加密密碼');
                return;
            }
            if (!text) {
                alert('請輸入講義文字');
                return;
            }

            try {
                let parsed;
                try {
                    parsed = JSON.parse(text);
                } catch(e) {
                    parsed = { rawContent: text };
                }

                const result = await AppCrypto.encryptObject(parsed, pwd);
                const codeSnippet = `// 自動生成的 AES-GCM 256-bit 加密講義數據庫\nconst ENCRYPTED_COURSE_PAYLOAD = ${JSON.stringify(result, null, 2)};`;
                
                document.getElementById('output').textContent = codeSnippet;
            } catch(e) {
                alert('加密失敗：' + e.message);
            }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            const content = document.getElementById('output').textContent;
            navigator.clipboard.writeText(content).then(() => {
                alert('已複製加密代碼至剪貼簿！');
            });
        });
    </script>
</body>
</html>
